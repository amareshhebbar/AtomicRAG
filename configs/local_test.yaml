stage:                    local_test
output_dir:               outputs/local_test
run_name:                 local-test

base_model_id:            Qwen/Qwen2.5-1.5B-Instruct
use_4bit:                 false        
max_seq_length:           256

lora_r:                   4
lora_alpha:               8
